name: Build Maskera

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: latest
          releaseName: "Maskera - Latest Build"
          releaseBody: |
            ## Installation
            Ladda ner och kör `Maskera_x.x.x_x64-setup.exe`.

            AI-modellen (~500 MB) laddas ner automatiskt första gången appen används och cachas lokalt.
          releaseDraft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
