name: Build Maskera

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Long Paths
        run: |
          git config --system core.longpaths true
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -Force

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Frontend
        run: npm install && npm run build

      - name: Install Python Dependencies and Build Executable
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic transformers torch pyinstaller
          pyinstaller --onefile masking_engine.py --name Maskera --add-data "dist;dist" --icon src-tauri/icons/icon.ico

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: "Maskera - Latest Build"
          body: "Ladda ner Maskera.exe och kör den. Din webbläsare öppnas automatiskt. Första gången laddas AI-modellen ner (~500 MB)."
          files: dist/Maskera.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
