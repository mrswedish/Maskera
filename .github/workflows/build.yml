name: Build Maskera

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: latest
          releaseName: "Maskera - Latest Build"
          releaseBody: |
            ## Nedladdning

            | Fil | Beskrivning |
            |---|---|
            | `Maskera-portabel.exe` | **Portabel** — kör direkt, ingen installation |
            | `Maskera_x.x.x_x64-setup.exe` | Installer — installerar i Start-menyn |

            > AI-modellen (~120 MB) laddas ner automatiskt första gången och cachas lokalt.
            > Kräver Windows 10/11 med WebView2 (ingår i alla moderna Windows-installationer).
          releaseDraft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable EXE
        run: |
          Copy-Item "src-tauri/target/release/maskera.exe" "Maskera-portabel.exe"
          gh release upload latest "Maskera-portabel.exe" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
